<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ISG — static preview (WordPress + ACF template-parts)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@500&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/main.css" />
    <link rel="stylesheet" href="assets/css/lenis.css" />
    <script type="importmap">
      {
        "imports": {
          "gsap": "https://esm.sh/gsap@3.12.5",
          "gsap/ScrollTrigger": "https://esm.sh/gsap@3.12.5/ScrollTrigger",
          "lenis": "https://esm.sh/lenis@1.1.18",
          "swiper": "https://esm.sh/swiper@11",
          "swiper/modules": "https://esm.sh/swiper@11/modules"
        }
      }
    </script>
  </head>
  <body class="isg-preloader-active">
    <!--
      Локальный просмотр: из каталога wp-theme-isg выполните npm run dev
      (SCSS watch + сервер на http://localhost:5173 с автообновлением).
      fetch() для partials не работает с file://.
    -->
    <div
      id="isg-preloader"
      class="isg-preloader"
      role="status"
      aria-live="polite"
      aria-busy="true"
      aria-label="Loading page"
    >
      <div class="isg-preloader__inner">
        <span class="isg-preloader__value" data-isg-preloader-value>0%</span>
        <span class="isg-preloader__label" data-isg-preloader-label>Preparing assets</span>
        <div
          class="isg-preloader__bar"
          role="progressbar"
          aria-label="Page loading progress"
          aria-valuemin="0"
          aria-valuemax="100"
          aria-valuenow="0"
        >
          <span class="isg-preloader__bar-fill" data-isg-preloader-bar></span>
        </div>
        <span class="isg-preloader__sr">Loading…</span>
      </div>
    </div>
    <main id="isg-main"></main>
    <script type="module" src="assets/js/main.js"></script>
    <script>
    // DEBUG: check sticky ancestors for About
    setTimeout(function(){
      var s = document.querySelector('#isg-about .isg-quality-content__sticky');
      if(!s){console.warn('DIAG: sticky element NOT FOUND'); return;}
      var computed = getComputedStyle(s);
      console.warn('DIAG: sticky position=' + computed.position + ' top=' + computed.top);
      var el = s.parentElement;
      while(el){
        var cs = getComputedStyle(el);
        var tag = el.tagName + (el.id?'#'+el.id:'') + '.' + (el.className||'').toString().split(' ')[0];
        console.warn('DIAG: ' + tag + ' overflow=' + cs.overflow + ' overflowX=' + cs.overflowX + ' overflowY=' + cs.overflowY);
        el = el.parentElement;
      }
      var track = s.parentElement;
      console.warn('DIAG: track minHeight=' + (track?track.style.minHeight:'?') + ' offsetHeight=' + (track?track.offsetHeight:'?'));
    }, 3000);
    </script>
  </body>
</html>
