<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ISG — static preview (WordPress + ACF template-parts)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@500&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/main.css" />
    <link rel="stylesheet" href="assets/css/lenis.css" />
    <script type="importmap">
      {
        "imports": {
          "gsap": "https://esm.sh/gsap@3.12.5",
          "gsap/ScrollTrigger": "https://esm.sh/gsap@3.12.5/ScrollTrigger",
          "lenis": "https://esm.sh/lenis@1.1.18"
        }
      }
    </script>
    <!-- tiny-slider: CJS-сборка задаёт глобальный tns(); ES import часто падает в браузере -->
    <script src="assets/js/vendor/tiny-slider.min.js"></script>
  </head>
  <body class="isg-preloader-active">
    <!--
      Локальный просмотр: из каталога wp-theme-isg выполните npm run dev
      (SCSS watch + сервер на http://localhost:5173 с автообновлением).
      fetch() для partials не работает с file://.
    -->
    <div
      id="isg-preloader"
      class="isg-preloader"
      role="status"
      aria-live="polite"
      aria-busy="true"
      aria-label="Loading page"
    >
      <div class="isg-preloader__inner">
        <span class="isg-preloader__mark" aria-hidden="true"></span>
        <span class="isg-preloader__sr">Loading…</span>
      </div>
    </div>
    <main id="isg-main"></main>
    <script type="module" src="assets/js/main.js"></script>
  </body>
</html>
