<header class="isg-site-header isg-hero__header" data-isg-sticky-header>
  <div class="isg-site-header__chrome">

    <div class="isg-hero__nav-wrap isg-header-desktop-only">
      <nav class="isg-nav-pill" aria-label="Primary" data-isg-section-nav>
        <a class="isg-hero__logo isg-nav-pill__brand" href="#isg-hero" aria-label="ISG - Home">
          <img class="isg-hero__logo-img" src="assets/img/logo_footer.svg" alt="" width="167" height="23"
            decoding="async" />
        </a>
        <div class="isg-nav-pill__inner">
          <div
            class="isg-nav-pill__row isg-nav-pill__row--slider isg-nav-pill__row--sections isg-nav-pill__row--slider--init isg-header-nav"
            data-isg-nav-slider>
            <span class="isg-nav-pill__slider" aria-hidden="true"></span>
            <a class="isg-btn isg-btn--ghost-dark" href="#isg-product">Products</a>
            <a class="isg-btn isg-btn--ghost-dark" href="#isg-application">Applications</a>
            <a class="isg-btn isg-btn--ghost-dark" href="#isg-quality">Production</a>
            <a class="isg-btn isg-btn--ghost-dark" href="#isg-about">Certificates</a>
          </div>
        </div>
        <div class="isg-header-contact" aria-label="Contact information">
          <span class="isg-header-contact__eu-link">
            <img class="isg-header-contact__eu-logo" src="assets/img/logos.svg" alt="Dofinansowane przez Unię Europejską" width="1783" height="525" decoding="async" />
          </span>
          <span class="isg-header-contact__dot" aria-hidden="true"></span>
          <div class="isg-header-contact__text">
            <span>Mon-Fri | 8:00-16:00</span>
            <span>Phone | +48 881 560 845</span>
          </div>
        </div>
        <a class="isg-btn isg-btn--ghost-dark isg-header-rfq" href="#isg-rfq-content">Send RFQ</a>
        <div class="isg-hero__lang">
          <div class="isg-lang-dropdown" data-isg-lang-nav>
            <button type="button" class="isg-lang-dropdown__toggle isg-btn isg-btn--ghost-dark" data-isg-lang-toggle
              aria-haspopup="listbox" aria-expanded="false">
              <span class="isg-lang-dropdown__current" data-isg-lang-current>EN</span>
              <span class="isg-lang-dropdown__chevron" aria-hidden="true"></span>
            </button>
            <div class="isg-lang-dropdown__menu" data-isg-lang-menu role="listbox" hidden>
              <button type="button" class="isg-lang-dropdown__option isg-btn isg-btn--ghost-dark isg-btn--active"
                data-isg-lang="en" role="option" aria-selected="true">EN</button>
              <button type="button" class="isg-lang-dropdown__option isg-btn isg-btn--ghost-dark" data-isg-lang="pl"
                role="option" aria-selected="false">PL</button>
              <button type="button" class="isg-lang-dropdown__option isg-btn isg-btn--ghost-dark" data-isg-lang="de"
                role="option" aria-selected="false">DE</button>
            </div>
          </div>
        </div>
      </nav>
    </div>
    <a class="isg-header-mobile-logo" href="#isg-hero" aria-label="ISG - Home">
      <img class="isg-header-mobile-logo__img" src="assets/img/logo-short.svg" alt="" width="66" height="23"
        decoding="async" />
    </a>
    <span class="isg-header-mobile-eu-logo">
      <img class="isg-header-mobile-eu-logo__img" src="assets/img/logos.svg" alt="Dofinansowane przez Unię Europejską" width="1783" height="525" decoding="async" />
    </span>
    <button type="button" class="isg-burger" data-isg-burger aria-controls="isg-nav-drawer" aria-expanded="false"
      aria-label="Open menu">
      <span class="isg-burger__bars" aria-hidden="true"></span>
    </button>
  </div>
  <div id="isg-nav-drawer" class="isg-nav-drawer" aria-hidden="true">
    <button type="button" class="isg-nav-drawer__backdrop" data-isg-drawer-close tabindex="-1"
      aria-label="Close menu"></button>
    <div class="isg-nav-drawer__panel">
      <nav class="isg-nav-drawer__nav" aria-label="Primary mobile" data-isg-section-nav>
        <a class="isg-btn isg-btn--ghost-dark isg-nav-drawer__link" href="#isg-product">Products</a>
        <a class="isg-btn isg-btn--ghost-dark isg-nav-drawer__link" href="#isg-application">Applications</a>
        <a class="isg-btn isg-btn--ghost-dark isg-nav-drawer__link" href="#isg-quality">Production</a>
        <a class="isg-btn isg-btn--ghost-dark isg-nav-drawer__link" href="#isg-about">Certificates</a>
        <a class="isg-btn isg-btn--ghost-dark isg-nav-drawer__link" href="#isg-rfq-content">Send RFQ</a>
      </nav>
      <div class="isg-nav-drawer__footer">
        <div class="isg-nav-drawer__contact" aria-label="Contact information">
          <span class="isg-header-contact__dot" aria-hidden="true"></span>
          <div class="isg-nav-drawer__contact-text">
            <span>Mon-Fri | 8:00-16:00</span>
            <span>Phone | +48 881 560 845</span>
          </div>
        </div>
        <div class="isg-nav-drawer__lang">
          <span class="isg-nav-drawer__lang-label">Language</span>
          <div class="isg-lang-dropdown isg-lang-dropdown--drawer" data-isg-lang-nav>
            <button type="button" class="isg-lang-dropdown__toggle isg-btn isg-btn--ghost-dark" data-isg-lang-toggle
              aria-haspopup="listbox" aria-expanded="false">
              <span class="isg-lang-dropdown__current" data-isg-lang-current>EN</span>
              <span class="isg-lang-dropdown__chevron" aria-hidden="true"></span>
            </button>
            <div class="isg-lang-dropdown__menu" data-isg-lang-menu role="listbox" hidden>
              <button type="button" class="isg-lang-dropdown__option isg-btn isg-btn--ghost-dark isg-btn--active"
                data-isg-lang="en" role="option" aria-selected="true">EN</button>
              <button type="button" class="isg-lang-dropdown__option isg-btn isg-btn--ghost-dark" data-isg-lang="pl"
                role="option" aria-selected="false">PL</button>
              <button type="button" class="isg-lang-dropdown__option isg-btn isg-btn--ghost-dark" data-isg-lang="de"
                role="option" aria-selected="false">DE</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</header>
