<!-- Site header (общий с hero; в превью идёт первым в #isg-main) -->
<header class="isg-site-header isg-hero__header" data-isg-sticky-header>
  <div class="isg-site-header__chrome">
    <div class="isg-hero__logo" data-isg-section-nav>
      <!-- ACF: hero_logo — src из темы -->
      <a class="isg-hero__logo-link" href="#isg-hero" aria-label="ISG — Home">
        <!-- Inline: SVG с mask через <img> в части браузеров не рисуется; файл-референс: assets/img/logo.svg -->
        <svg
          class="isg-hero__logo-img"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 2246 822"
          width="110"
          height="34"
          aria-hidden="true"
          focusable="false"
        >
          <defs>
            <style>
              .isg-logo-st0 {
                fill: #111;
              }
              .isg-logo-st1 {
                fill: #fff;
              }
              .isg-logo-st2 {
                mask: url(#isg-header-logo-mask);
              }
            </style>
            <mask
              id="isg-header-logo-mask"
              x=".49"
              y="0"
              width="2245.5"
              height="821.28"
              maskUnits="userSpaceOnUse"
            >
              <path
                class="isg-logo-st1"
                d="M1536.86,0h-966.81C432.06,0,319.79,116.26,319.79,259.18s112.27,259.18,250.26,259.18h782.59c23.18,0,42.04,19.53,42.04,43.76,0,22.43-16.47,40.94-37.54,43.29-1.49.16-2.98.25-4.5.25H418.04c-88.69,0-160.85-74.72-160.85-166.58v-136.36H48.99v136.36c0,209.38,163.43,379.95,365.13,382.17,1.3.01,2.62.04,3.92.04h934.6c6.89,0,13.69-.37,20.42-.94h597.09c144.76,0,262.55-109.76,262.55-244.65,0-155.62-112.89-272.98-262.55-272.98h-344.5l104.32,215.64h248.33c21.76,0,39.74,17.53,41.05,40.01l.1,1.9c.07.84.08,1.7.08,2.55,0,23.51-18.4,42.59-41.11,42.59h-379.33c2.34-14.18,3.81-28.66,3.81-43.5,0-142.93-112.27-259.19-250.26-259.19h-782.59c-23.2,0-42.06-19.53-42.06-43.54s18.86-43.55,42.06-43.55h1571.83L2245.99,0h-709.13Z"
              />
            </mask>
          </defs>
          <g class="isg-logo-st2">
            <path
              class="isg-logo-st0"
              d="M1536.86,0h-966.81c-138,0-250.26,116.26-250.26,259.18s112.27,259.18,250.26,259.18h782.59c23.18,0,42.04,19.53,42.04,43.76,0,22.43-16.47,40.94-37.54,43.29-1.49.16-2.98.25-4.5.25H418.04c-88.69,0-174.05-67.3-174.05-159.15l-16.5-72-7.5-71.79H.49v139.29c0,209.38,211.93,377.03,413.63,379.24,1.3.01,2.62.04,3.92.04h934.6c6.89,0,13.69-.37,20.42-.94h597.09c144.76,0,262.55-109.76,262.55-244.65,0-155.62-112.89-272.98-262.55-272.98h-156.15l-17.5,85.79-49.01,129.85h230.81c21.76,0,39.74,17.53,41.05,40.01l.1,1.9c.07.84.08,1.7.08,2.55,0,23.51-18.4,42.59-41.11,42.59h-379.33c2.34-14.18,3.81-28.66,3.81-43.5,0-142.93-112.27-259.19-250.26-259.19h-782.59c-23.2,0-42.06-19.53-42.06-43.54s18.86-43.55,42.06-43.55h1571.83L2245.99,0h-709.13Z"
            />
          </g>
        </svg>
      </a>
    </div>
    <button
      type="button"
      class="isg-burger"
      data-isg-burger
      aria-controls="isg-nav-drawer"
      aria-expanded="false"
      aria-label="Open menu"
    >
      <span class="isg-burger__bars" aria-hidden="true"></span>
    </button>
    <div class="isg-hero__nav-wrap isg-header-desktop-only">
      <nav class="isg-nav-pill" aria-label="Primary" data-isg-section-nav>
        <div class="isg-nav-pill__inner">
          <div
            class="isg-nav-pill__row isg-nav-pill__row--slider isg-nav-pill__row--sections isg-nav-pill__row--slider--init"
            data-isg-nav-slider
          >
            <span class="isg-nav-pill__slider" aria-hidden="true"></span>
            <a class="isg-btn isg-btn--ghost-dark" href="#isg-application">Solutions</a>
            <a class="isg-btn isg-btn--ghost-dark" href="#isg-product">Product range</a>
            <a class="isg-btn isg-btn--ghost-dark" href="#isg-quality">Quality</a>
            <a class="isg-btn isg-btn--ghost-dark" href="#isg-about">About</a>
            <a class="isg-btn isg-btn--ghost-dark" href="#isg-rfq-content">Contact</a>
          </div>
        </div>
      </nav>
    </div>
    <div class="isg-site-header__cluster isg-header-desktop-only">
      <div class="isg-hero__lang">
        <div class="isg-nav-pill isg-lang-pill">
          <div class="isg-nav-pill__inner">
            <div
              class="isg-nav-pill__row isg-nav-pill__row--slider isg-lang-pill__row isg-nav-pill__row--slider--init"
              data-isg-nav-slider
              data-isg-lang-nav
            >
              <span class="isg-nav-pill__slider" aria-hidden="true"></span>
              <a class="isg-btn isg-btn--ghost-dark isg-btn--active" href="#" data-isg-lang="en" aria-current="true">EN</a>
              <a class="isg-btn isg-btn--ghost-dark" href="#" data-isg-lang="pl">PL</a>
              <a class="isg-btn isg-btn--ghost-dark" href="#" data-isg-lang="de">DE</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div id="isg-nav-drawer" class="isg-nav-drawer" aria-hidden="true">
    <button type="button" class="isg-nav-drawer__backdrop" data-isg-drawer-close tabindex="-1" aria-label="Close menu"></button>
    <div class="isg-nav-drawer__panel">
      <nav class="isg-nav-drawer__nav" aria-label="Primary mobile" data-isg-section-nav>
        <a class="isg-btn isg-btn--ghost-dark" href="#isg-application">Solutions</a>
        <a class="isg-btn isg-btn--ghost-dark" href="#isg-product">Product range</a>
        <a class="isg-btn isg-btn--ghost-dark" href="#isg-quality">Quality</a>
        <a class="isg-btn isg-btn--ghost-dark" href="#isg-about">About</a>
        <a class="isg-btn isg-btn--ghost-dark" href="#isg-rfq-content">Contact</a>
      </nav>
      <div class="isg-nav-drawer__lang" data-isg-lang-nav>
        <span class="isg-nav-drawer__lang-label">Language</span>
        <div
          class="isg-nav-drawer__lang-row isg-nav-pill__row isg-nav-pill__row--slider isg-nav-pill__row--slider--init"
          data-isg-nav-slider
          data-isg-lang-nav
        >
          <span class="isg-nav-pill__slider" aria-hidden="true"></span>
          <a class="isg-btn isg-btn--ghost-dark isg-btn--active" href="#" data-isg-lang="en" aria-current="true">EN</a>
          <a class="isg-btn isg-btn--ghost-dark" href="#" data-isg-lang="pl">PL</a>
          <a class="isg-btn isg-btn--ghost-dark" href="#" data-isg-lang="de">DE</a>
        </div>
      </div>
    </div>
  </div>
</header>
