<!-- Flexible Content layout: hero -->
<section id="isg-hero" class="isg-hero" data-isg-block="hero" aria-label="Hero">
  <!-- Фоновое видео: CDN (не хранить тяжёлый mp4 в репозитории). ACF: hero_video_url -->
  <div class="isg-hero__video" aria-hidden="true">
    <video
      class="isg-hero__video-media"
      autoplay
      muted
      loop
      playsinline
      poster="assets/img/img-test-1.jpg"
    >
      <source src="https://res.cloudinary.com/dfuh3h6e5/video/upload/v1774773307/hero-video_cwxqya.mp4" type="video/mp4" />
    </video>
  </div>
  <div class="isg-hero__conteiner container">
    <div class="isg-hero__content">
      <div class="isg-title-group">
        <!-- ACF: hero_title -->
        <h1 class="isg-display isg-text-center isg-hero__title">
          Large-Diameter <br />
          Spiral-Welded Pipes
        </h1>
        <!-- ACF: hero_subtitle -->
        <p class="isg-lead isg-text-center isg-hero__lead">Infrastructure &amp; industrial projects</p>
      </div>
      <div class="isg-btn-group isg-btn-group--spread isg-btn-group--hero-actions">
        <a class="isg-btn isg-btn--blur" href="#">Download catalogue</a>
        <button
          type="button"
          class="isg-hero-watch-btn"
          data-isg-lightbox="https://res.cloudinary.com/dfuh3h6e5/video/upload/v1774773307/hero-video_cwxqya.mp4"
          data-isg-lightbox-kind="video"
          aria-label="Watch video"
        >
          <span class="isg-hero-watch-btn__thumb" aria-hidden="true">
            <video
              class="isg-hero-watch-btn__preview"
              muted
              loop
              playsinline
              autoplay
              preload="metadata"
              poster="assets/img/img-test-1.jpg"
            >
              <source src="https://res.cloudinary.com/dfuh3h6e5/video/upload/v1774773307/hero-video_cwxqya.mp4" type="video/mp4" />
            </video>
            <span class="isg-hero-watch-btn__play">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M9 7.5v9l7.5-4.5L9 7.5z" fill="currentColor" />
              </svg>
            </span>
          </span>
          <span class="isg-hero-watch-btn__label">Watch video</span>
        </button>
      </div>
    </div>
  </div>
</section>
